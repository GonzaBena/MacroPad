<div class="config-page">
  <div class="config-header">
    <button class="btn-back" id="btn-back-config">
      <span>←</span> Volver
    </button>
    <h2 class="config-title">Configuraciones Generales</h2>
  </div>
  
  <div class="config-body">
    <div class="config-section">
      <div class="config-section-title">Preferencias de la aplicación</div>
      
      <div class="config-row">
        <div class="config-label">Tema visual</div>
        <select class="config-input" id="cfg-theme">
          <option>Oscuro (Por defecto)</option>
        </select>
      </div>
      
      <div class="config-row">
        <div class="config-label">Color de Acento</div>
        <div class="config-color-field">
          <input type="text" class="config-input config-input-hex" id="cfg-accent" value="#f5a623" maxlength="7" spellcheck="false" placeholder="#f5a623">
          <button class="config-color-btn" id="cfg-accent-btn" title="Abrir selector de color">
            <span class="config-color-preview" id="cfg-accent-preview"></span>
          </button>
          <input type="color" id="cfg-accent-picker" value="#f5a623" class="d-none">
        </div>
      </div>
      
      <div class="config-row">
        <div class="config-label">Comportamiento al cerrar</div>
        <select class="config-input" id="cfg-close">
          <option value="close">Cerrar completamente</option>
          <option value="tray">Minimizar a la bandeja del sistema (Próximamente)</option>
        </select>
      </div>
    </div>

    <div class="config-section config-data-section">
      <div class="config-section-title">Datos y configuración</div>
      
      <div class="config-row">
        <div class="config-label">Exportar / Importar</div>
        <div class="config-data-actions">
          <button class="btn-export" id="btn-export">📦 Exportar configuración</button>
          <button class="btn-import" id="btn-import">📥 Importar configuración</button>
        </div>
      </div>
      <div class="config-row">
        <div class="config-label config-hint">Exportá tus workflows y configuraciones a un archivo JSON para hacer backup o transferir a otra PC.</div>
      </div>
    </div>
    
    <div class="config-actions">
      <button class="btn-save-config" id="btn-save-config">Guardar Configuraciones</button>
    </div>
  </div>
</div>
