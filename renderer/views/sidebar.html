<div class="s-section" id="section-serial">
  <div class="s-label">Conexión Serial</div>
  <div class="field">
    <label>Puerto</label>
    <div class="port-select-row">
      <select id="port-sel">
        <option value="">— Seleccioná un puerto —</option>
      </select>
      <button class="btn-icon" id="btn-refresh-ports">↺</button>
    </div>
  </div>
  <div class="field">
    <label>Baud Rate</label>
    <select id="baud-sel">
      <option value="9600" selected>9600</option>
      <option value="19200">19200</option>
      <option value="38400">38400</option>
      <option value="57600">57600</option>
      <option value="115200">115200</option>
    </select>
  </div>
  <div class="status-badge">
    <span class="s-dot" id="s-dot"></span>
    <span class="s-text" id="s-text">Desconectado</span>
  </div>
  <div id="reconnect-indicator" class="reconnect-indicator d-none">
    <span class="reconnect-spinner">⟳</span>
    <span id="reconnect-text">Reconectando...</span>
    <button class="btn-ghost-sm" id="btn-cancel-reconnect">✕</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-conn">Conectar</button>
    <button class="btn btn-ghost btn-ports" id="btn-refresh-ports2" title="Actualizar puertos">↺</button>
  </div>
</div>

<div class="s-section d-none" id="section-global-vars">
  <div class="s-section-header">
    <span class="s-label">Variables Globales</span>
    <button class="btn-icon s-section-add" id="btn-sb-add-gv" title="Nueva variable">+</button>
  </div>
  <div id="sb-gv-list" class="sb-gv-list"></div>
</div>
