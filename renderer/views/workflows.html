<div class="configure-split" id="config-content">
  <div class="signal-list-panel" id="siglist-panel">
    <div class="slp-header">
      <div class="slp-header-top">
        <div class="s-label">Señales</div>
        <div class="slp-header-actions">
          <span class="save-indicator" id="save-indicator">✓ Guardado</span>
          <button class="btn-header-small" id="btn-import-workflow" title="Importar Workflow">📥</button>
        </div>
      </div>
      <div class="slp-sort">
        <select id="sort-workflows" title="Ordenar por...">
          <option value="original">Orden original</option>
          <option value="name">Nombre</option>
          <option value="active">Activos primero</option>
          <option value="created">Último creado</option>
          <option value="steps">Cantidad de pasos</option>
        </select>
      </div>
      <div class="slp-search">
        <input type="text" id="sig-search" placeholder="Buscar workflows..." autocomplete="off" spellcheck="false" />
        <button id="btn-clear-search" class="btn-clear-search" title="Limpiar búsqueda">✕</button>
      </div>
    </div>
    <div class="signal-list" id="signal-list"></div>
  </div>

  <div class="resizer" id="siglist-resizer"></div>

  <div class="step-editor-panel">
    <div class="se-empty" id="se-empty">
      <svg class="se-empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6" width="32" height="7" rx="2.5"/>
        <rect x="4" y="18" width="24" height="7" rx="2.5"/>
        <rect x="4" y="30" width="14" height="7" rx="2.5"/>
      </svg>
      <span>Seleccioná un workflow</span>
      <span class="se-empty-sub">o creá uno nuevo en el panel izquierdo</span>
    </div>
    <div class="se-content d-none" id="se-content">
      <div class="se-header">
        <span class="se-signal-tag" id="se-signal-tag"></span>
        <input class="se-label-input" type="text" id="se-label-input" placeholder="Nombre descriptivo..." />
        <div class="assign-dropdown-wrap">
          <button class="btn-assign" id="btn-assign"
            title="Asignar al botón físico del Arduino">
            🔌 Asignar
          </button>
          <div id="assign-dropdown" class="dropdown-content">
            <div class="dropdown-item" data-speed="RAPIDA">Rápida</div>
            <div class="dropdown-item" data-speed="MEDIA">Media</div>
            <div class="dropdown-item" data-speed="LENTA">Lenta</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" id="item-assign-app">📂 Vincular a aplicación</div>
          </div>
        </div>
        <button class="btn-test" id="btn-test">
          ▶ Probar
        </button>
        <button class="btn-del-sig" id="btn-del-sig">
          ✕
        </button>
      </div>
      <div class="flow-container" id="flow-container"></div>
      <div class="add-step-bar">
        <div class="add-step-wrap">
          <button class="add-step-btn" id="add-step-btn">
            + Agregar paso
          </button>
          <span class="add-step-hint">Ctrl+F para buscar</span>
          <div class="step-menu" id="step-menu"></div>
        </div>
      </div>
    </div>
  </div>
</div>
