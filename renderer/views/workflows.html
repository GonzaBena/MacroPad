<div class="configure-split" id="config-content">
  <div class="signal-list-panel" id="siglist-panel">
    <div class="slp-header">
      <div class="slp-header-top">
        <div class="s-label">Señales</div>
        <button class="btn-import-small" id="btn-import-workflow" title="Importar Workflow (JSON o Portapapeles)">📥</button>
      </div>
      <div class="slp-add">
        <input type="text" id="new-sig-cfg" placeholder="NUEVA_SEÑAL" maxlength="40" />
        <button id="btn-add-signal">+</button>
      </div>
    </div>
    <div class="signal-list" id="signal-list"></div>
  </div>

  <div class="resizer" id="siglist-resizer"></div>

  <div class="step-editor-panel">
    <div class="se-empty" id="se-empty">
      <span class="ico">↰</span>
      <span>Seleccioná una señal</span>
    </div>
    <div class="se-content d-none" id="se-content">
      <div class="se-header">
        <span class="se-signal-tag" id="se-signal-tag"></span>
        <input class="se-label-input" type="text" id="se-label-input" placeholder="Nombre descriptivo..." />
        <div class="assign-dropdown-wrap">
          <button class="btn-assign" id="btn-assign"
            title="Asignar al botón físico del Arduino">
            🔌 Asignar
          </button>
          <div id="assign-dropdown" class="dropdown-content">
            <div class="dropdown-item" data-speed="RAPIDA">Rápida</div>
            <div class="dropdown-item" data-speed="MEDIA">Media</div>
            <div class="dropdown-item" data-speed="LENTA">Lenta</div>
          </div>
        </div>
        <button class="btn-test" id="btn-test">
          ▶ Probar
        </button>
        <button class="btn-del-sig" id="btn-del-sig">
          ✕
        </button>
      </div>
      <div class="flow-container" id="flow-container"></div>
      <div class="add-step-bar">
        <div class="add-step-wrap">
          <button class="add-step-btn" id="add-step-btn">
            + Agregar paso
          </button>
          <div class="step-menu" id="step-menu"></div>
        </div>
      </div>
    </div>
  </div>
</div>
