<div class="metrics-panel">
  <div class="metrics-header">
    <div class="s-label">Estadísticas de Uso</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="metrics-total">0</div>
      <div class="stat-label">Usos Totales</div>
    </div>
    <div class="stat-card success">
      <div class="stat-value" id="metrics-success">0</div>
      <div class="stat-label">Éxitos</div>
    </div>
    <div class="stat-card failure">
      <div class="stat-value" id="metrics-failure">0</div>
      <div class="stat-label">Fallos</div>
    </div>
    <div class="stat-card rate">
      <div class="stat-value" id="metrics-rate">0%</div>
      <div class="stat-label">Tasa de Éxito</div>
    </div>
  </div>

  <div class="history-section">
    <div class="s-label">Últimas Ejecuciones</div>
    <div class="history-list" id="metrics-history-list">
      <!-- Items will be injected here -->
    </div>
  </div>
</div>
