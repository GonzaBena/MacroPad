<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacroPad</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <div class="titlebar">
      <div class="tb-brand">
        <span class="tb-dot" id="tb-dot"></span>
        PokePad
      </div>
      
      <div class="tb-menu">
        <div class="menu-wrapper">
          <div class="menu-btn">Archivo</div>
          <div class="dropdown">
            <div class="dd-item" onclick="openConfigView()">Configuraciones...</div>
            <div class="dd-divider"></div>
            <div class="dd-item" onclick="window.arduino.close()">Salir</div>
          </div>
        </div>
        <div class="menu-wrapper">
          <div class="menu-btn">Editar</div>
          <div class="dropdown">
            <div class="dd-item">Deshacer</div>
          </div>
        </div>
      </div>
      <div class="tb-controls">
        <button class="wbtn" onclick="window.arduino.minimize()">−</button>
        <button class="wbtn" onclick="window.arduino.maximize()">□</button>
        <button class="wbtn close" onclick="window.arduino.close()">✕</button>
      </div>
    </div>

    <div class="content" id="main-content">
      <div class="sidebar" id="main-sidebar"></div>
      <div class="resizer" id="main-resizer"></div>

      <div class="panel">
        <div class="tabs">
          <div class="tab active" onclick="switchTab('monitor', this)">
            Monitor
          </div>
          <div class="tab" onclick="switchTab('workflows', this)">
            Workflows
          </div>
        </div>

        <!-- Monitor -->
        <div class="tab-pane active" id="tab-monitor"></div>

        <!-- workflows -->
        <div class="tab-pane" id="tab-workflows"></div>
      </div>
    </div>
    <div class="content" id="config-view" style="display: none;"></div>
  </div>
  <div id="toasts"></div>

  <!-- Modales -->
  <div class="cmd-modal-overlay" id="cmd-modal-overlay" style="display: none;"></div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
