<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      background-color: transparent;
      padding: 20px;
    }
    .card {
      background: var(--surface);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border: 1px solid var(--border);
    }
    h1 { color: var(--accent); margin-top: 0; }
    p { line-height: 1.5; opacity: 0.8; }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    pre {
      background: var(--bg-darker);
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧩 Template UI</h1>
    <p>This is a custom view loaded from a plugin! You can build anything here using standard HTML, CSS, and JS.</p>
    
    <div style="margin: 20px 0;">
      <button id="get-state">Fetch App State</button>
    </div>

    <p><strong>Raw State:</strong></p>
    <pre id="state-output">Click the button to see the state...</pre>
  </div>

  <script>
    /**
     * Interaction with PokePad is done via the 'window.arduino' bridge.
     * This bridge is automatically injected and provides access to core functions.
     */
    const btn = document.getElementById('get-state');
    const output = document.getElementById('state-output');

    btn.addEventListener('click', async () => {
      try {
        // You can use any function exposed in preload.js
        const state = await window.arduino.getState();
        output.textContent = JSON.stringify(state, (key, value) => {
          // Filter large arrays for display
          if (Array.isArray(value) && value.length > 5) return `Array(${value.length})`;
          return value;
        }, 2);
      } catch (err) {
        output.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
