name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # necesario para crear la release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/*.exe
          - os: macos-latest
            artifact: dist/*.dmg
          - os: ubuntu-latest
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # serialport es nativo → hay que recompilarlo para Electron
      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Build installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
